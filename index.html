<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Biometric Scanner</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- MediaPipe Libraries for Face Mesh & Holistic -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050a0f;
            font-family: 'Share Tech Mono', monospace;
            color: #00f0ff;
            user-select: none;
        }

        /* Video Filter (Night Vision / Tech look) */
        video {
            filter: grayscale(80%) contrast(120%) brightness(80%) sepia(50%) hue-rotate(180deg);
            transform: scaleX(-1); /* Mirror image */
            object-fit: cover;
            width: 100%;
            height: 100%;
        }

        canvas {
            transform: scaleX(-1); /* Mirror canvas to match video */
            object-fit: cover;
            width: 100%;
            height: 100%;
        }

        /* Animations */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .animate-blink { animation: blink 1s infinite; }
        
        @keyframes pulse-glow {
            0%, 100% { text-shadow: 0 0 5px #00f0ff, 0 0 10px #00f0ff; }
            50% { text-shadow: 0 0 2px #00f0ff; }
        }
        .text-glow { animation: pulse-glow 2s infinite; }

        /* Loader */
        #loader {
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body class="w-screen h-screen relative">

    <!-- Loading Screen -->
    <div id="loader" class="absolute inset-0 w-full h-full text-[#00f0ff]">
        <div class="text-4xl mb-4 text-glow">INITIALIZING SECURE LINK...</div>
        <div class="text-sm opacity-70">AWAITING CAMERA AUTHORIZATION & NEURAL NET ASSETS</div>
        <div class="mt-8 border border-[#00f0ff] p-1 w-64">
            <div id="loading-bar" class="h-4 bg-[#00f0ff] w-0 transition-all duration-300"></div>
        </div>
    </div>

    <!-- Media Container -->
    <div class="absolute inset-0 z-0">
        <video id="input_video" class="absolute inset-0" autoplay playsinline></video>
        <canvas id="output_canvas" class="absolute inset-0"></canvas>
    </div>

    <!-- Mode Toggle Button -->
    <button id="mode-btn" class="absolute bottom-6 right-6 z-50 bg-[#001428]/80 backdrop-blur px-4 py-2 text-[#00f0ff] hover:bg-[#00f0ff]/20 transition-colors border border-[#00f0ff] cursor-pointer font-bold tracking-widest text-xs pointer-events-auto shadow-[0_0_10px_rgba(0,240,255,0.3)]">
        SWITCH TO SKELETON MODEL
    </button>

    <script>
        // DOM Elements
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loader = document.getElementById('loader');
        const loadingBar = document.getElementById('loading-bar');

        // State variables
        let isLoaded = false;
        let frameCount = 0;
        let activeFaces = [];
        let activeHands = [];
        let activePose = null;
        let displayMode = 'human'; // Defaults to 'human' or 'skeleton'

        // Load Brand Logo
        const brandLogo = new Image();
        brandLogo.src = 'https://i.ibb.co/rfs2sDK5/Whats-App-Image-2026-02-12-at-11-40-19-PM-removebg-preview.png';

        // ==========================================
        // --- EXTERNAL HUMAN IMAGE RIGGING ASSETS ---
        // Replace these .src strings with URLs to your own transparent PNGs!
        // E.g., humanTorsoImg.src = 'https://i.imgur.com/your-shirt.png';
        // ==========================================
        function createSvgDataUri(svgString) {
            return 'data:image/svg+xml;base64,' + btoa(svgString);
        }

        // T-Shirt / Torso
        const humanTorsoImg = new Image();
        humanTorsoImg.src = createSvgDataUri(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
            <path d="M 40,20 Q 100,-10 160,20 L 190,100 L 160,300 L 40,300 L 10,100 Z" fill="#3b82f6" stroke="#1e3a8a" stroke-width="6"/>
            <path d="M 70,20 Q 100,60 130,20" fill="#fbcfb5" stroke="#1e3a8a" stroke-width="4"/> <!-- Neck cutout -->
        </svg>`);

        // Upper Arm (Sleeves)
        const humanUpperArmImg = new Image(); 
        humanUpperArmImg.src = createSvgDataUri(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 300">
            <rect x="20" y="0" width="60" height="300" rx="30" fill="#3b82f6" stroke="#1e3a8a" stroke-width="5"/>
        </svg>`);

        // Lower Arm (Skin / Fleshy)
        const humanLowerArmImg = new Image(); 
        humanLowerArmImg.src = createSvgDataUri(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 300">
            <path d="M 30,0 L 70,0 Q 80,150 65,300 L 35,300 Q 20,150 30,0 Z" fill="#fbcfb5" stroke="#d99f81" stroke-width="4"/>
        </svg>`);

        // Upper Leg (Pants)
        const humanUpperLegImg = new Image();
        humanUpperLegImg.src = createSvgDataUri(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 300">
            <rect x="15" y="0" width="70" height="300" rx="20" fill="#1f2937" stroke="#111827" stroke-width="5"/>
        </svg>`);

        // Lower Leg (Pants + Shoes)
        const humanLowerLegImg = new Image();
        humanLowerLegImg.src = createSvgDataUri(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 300">
            <path d="M 25,0 L 75,0 L 65,240 L 35,240 Z" fill="#1f2937" stroke="#111827" stroke-width="5"/>
            <!-- Shoe -->
            <path d="M 35,240 L 65,240 L 80,300 L 10,300 Z" fill="#dc2626" stroke="#991b1b" stroke-width="5"/>
        </svg>`);

        // --- Utility: Console Logging ---
        function addLog(msg) {
            console.log(`[SYS] ${msg}`);
        }

        // --- Resize Handler ---
        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- 2D Image Rigging Engine ---
        // Dynamically stretches and rotates an external image to connect two tracking joints
        function drawRiggedImage(ctx, img, p1, p2, widthScale) {
            if (!p1 || !p2 || !img.complete || img.naturalWidth === 0) return;
            const x1 = p1.x * canvasElement.width;
            const y1 = p1.y * canvasElement.height;
            const x2 = p2.x * canvasElement.width;
            const y2 = p2.y * canvasElement.height;

            const dx = x2 - x1;
            const dy = y2 - y1;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const angle = Math.atan2(dy, dx);

            ctx.save();
            ctx.translate(x1, y1);
            // Rotate so the image points from joint 1 down to joint 2
            ctx.rotate(angle - Math.PI/2);

            const width = distance * widthScale;
            // Draw image centered on the bone line, stretching from y=0 to y=distance
            ctx.drawImage(img, -width / 2, 0, width, distance);
            ctx.restore();
        }

        // --- Animated Vector Rig Tool ---
        function drawRiggedPolygon(ctx, landmarks, connections, fillColor, strokeColor, lineWidth) {
            if (!landmarks || !connections) return;
            ctx.beginPath();
            ctx.moveTo(landmarks[connections[0][0]].x * canvasElement.width, landmarks[connections[0][0]].y * canvasElement.height);
            for (let i = 0; i < connections.length; i++) {
                ctx.lineTo(landmarks[connections[i][1]].x * canvasElement.width, landmarks[connections[i][1]].y * canvasElement.height);
            }
            ctx.closePath();
            
            if (fillColor) {
                ctx.fillStyle = fillColor;
                ctx.fill();
            }
            if (strokeColor) {
                ctx.strokeStyle = strokeColor;
                ctx.lineWidth = lineWidth;
                ctx.lineJoin = 'round';
                ctx.stroke();
            }
        }

        // --- Procedural Cartoon Bone Generator ---
        function drawCartoonBone(ctx, p1, p2, thickness) {
            if (!p1 || !p2) return;
            const x1 = p1.x * canvasElement.width;
            const y1 = p1.y * canvasElement.height;
            const x2 = p2.x * canvasElement.width;
            const y2 = p2.y * canvasElement.height;
            
            const dx = x2 - x1;
            const dy = y2 - y1;
            const angle = Math.atan2(dy, dx);
            
            ctx.strokeStyle = '#1f2937';
            ctx.lineWidth = thickness + 8;
            ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
            
            ctx.fillStyle = '#1f2937';
            const kOffset = thickness * 0.35;
            const cos = Math.cos(angle + Math.PI/2) * kOffset;
            const sin = Math.sin(angle + Math.PI/2) * kOffset;
            const knobRadius = thickness/2 + 3;
            ctx.beginPath(); ctx.arc(x1 + cos, y1 + sin, knobRadius, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x1 - cos, y1 - sin, knobRadius, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x2 + cos, y2 + sin, knobRadius, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x2 - cos, y2 - sin, knobRadius, 0, Math.PI*2); ctx.fill();

            ctx.strokeStyle = '#f8fafc';
            ctx.lineWidth = thickness;
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
            
            ctx.fillStyle = '#f8fafc';
            const innerRadius = thickness/2;
            ctx.beginPath(); ctx.arc(x1 + cos, y1 + sin, innerRadius, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x1 - cos, y1 - sin, innerRadius, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x2 + cos, y2 + sin, innerRadius, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x2 - cos, y2 - sin, innerRadius, 0, Math.PI*2); ctx.fill();
        }

        // --- Mode Toggle Logic ---
        const modeBtn = document.getElementById('mode-btn');
        
        modeBtn.addEventListener('click', () => {
            if (displayMode === 'human') {
                displayMode = 'skeleton';
                modeBtn.innerText = 'SWITCH TO HUMAN MODEL';
            } else {
                displayMode = 'human';
                modeBtn.innerText = 'SWITCH TO SKELETON MODEL';
            }
        });

        // --- MediaPipe Callbacks ---
        function onHolisticResults(results) {
            if (!isLoaded) {
                isLoaded = true;
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
                addLog('NEURAL NET ASSETS LOADED.');
                addLog('CAMERA LINK ESTABLISHED.');
            }
            
            activeFaces = results.faceLandmarks ? [results.faceLandmarks] : [];
            activeHands = [];
            if (results.leftHandLandmarks) activeHands.push(results.leftHandLandmarks);
            if (results.rightHandLandmarks) activeHands.push(results.rightHandLandmarks);
            activePose = results.poseLandmarks || null;
        }

        // --- Continuous Render Loop ---
        function renderLoop() {
            frameCount++;
            
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // 1. Draw solid Blueprint / Studio Background
            canvasCtx.fillStyle = '#050a0f'; // Deep cyber black background
            canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Draw a subtle glowing tech grid
            canvasCtx.strokeStyle = 'rgba(0, 240, 255, 0.1)'; // Faint cyan grid
            canvasCtx.lineWidth = 1;
            for(let i=0; i<canvasElement.width; i+=50) { canvasCtx.beginPath(); canvasCtx.moveTo(i,0); canvasCtx.lineTo(i,canvasElement.height); canvasCtx.stroke(); }
            for(let i=0; i<canvasElement.height; i+=50) { canvasCtx.beginPath(); canvasCtx.moveTo(0,i); canvasCtx.lineTo(canvasElement.width,i); canvasCtx.stroke(); }

            // Draw Brand Logo (Top Left)
            if (brandLogo.complete && brandLogo.naturalWidth > 0) {
                canvasCtx.save();
                const logoWidth = 150; 
                const logoHeight = (brandLogo.naturalHeight / brandLogo.naturalWidth) * logoWidth;
                
                // Un-mirror the canvas specifically for the logo so it isn't drawn backwards
                canvasCtx.translate(canvasElement.width, 0);
                canvasCtx.scale(-1, 1);
                
                // Add a neon cyan glow for the dark background
                canvasCtx.shadowColor = 'rgba(0, 240, 255, 0.5)';
                canvasCtx.shadowBlur = 15;
                canvasCtx.shadowOffsetY = 0;
                
                // Draw at standard top-left coordinates
                canvasCtx.drawImage(brandLogo, 30, 30, logoWidth, logoHeight);
                canvasCtx.restore();
            }

            if (displayMode === 'skeleton') {
                // ==========================================
                // SKELETON MODE RENDERING
                // ==========================================
                    // SKELETON MODE RENDERING
                    // ==========================================
                    if (activePose && activePose.length > 28) {
                        const p = activePose;
                        const midShoulder = { x: (p[11].x + p[12].x)/2, y: (p[11].y + p[12].y)/2 };
                        const midHip = { x: (p[23].x + p[24].x)/2, y: (p[23].y + p[24].y)/2 };
                        
                        drawCartoonBone(canvasCtx, midShoulder, midHip, 35); // Spine
                        let neckTop = p[0]; 
                        if (activeFaces.length > 0) neckTop = activeFaces[0][152]; 
                        drawCartoonBone(canvasCtx, midShoulder, neckTop, 20); // Neck
                        
                        // Ribs
                        for (let i = 0.2; i <= 0.8; i += 0.2) {
                            const spineX = midShoulder.x + (midHip.x - midShoulder.x) * i;
                            const spineY = midShoulder.y + (midHip.y - midShoulder.y) * i;
                            const width = Math.abs(p[11].x - p[12].x) * (1.2 - i*0.4); 
                            const rL = {x: spineX - width/2, y: spineY};
                            const rR = {x: spineX + width/2, y: spineY};
                            drawCartoonBone(canvasCtx, rL, rR, 15);
                        }
                        drawCartoonBone(canvasCtx, p[23], p[24], 25); // Hips
                        drawCartoonBone(canvasCtx, p[11], p[12], 25); // Shoulders
                        
                        drawCartoonBone(canvasCtx, p[11], p[13], 20); // L Upper Arm
                        drawCartoonBone(canvasCtx, p[13], p[15], 16); // L Lower Arm
                        drawCartoonBone(canvasCtx, p[12], p[14], 20); // R Upper Arm
                        drawCartoonBone(canvasCtx, p[14], p[16], 16); // R Lower Arm
                        
                        drawCartoonBone(canvasCtx, p[23], p[25], 24); // L Upper Leg
                        drawCartoonBone(canvasCtx, p[25], p[27], 20); // L Lower Leg
                        drawCartoonBone(canvasCtx, p[24], p[26], 24); // R Upper Leg
                        drawCartoonBone(canvasCtx, p[26], p[28], 20); // R Lower Leg
                    }
                    
                    if (activeFaces.length > 0) {
                        const face = activeFaces[0];
                        drawRiggedPolygon(canvasCtx, face, FACEMESH_FACE_OVAL, '#f8fafc', '#1f2937', 5);
                        drawRiggedPolygon(canvasCtx, face, FACEMESH_LEFT_EYEBROW, '#1f2937', '#1f2937', 7);
                        drawRiggedPolygon(canvasCtx, face, FACEMESH_RIGHT_EYEBROW, '#1f2937', '#1f2937', 7);

                        // Nose Cavity
                        if (face.length > 279) {
                            canvasCtx.fillStyle = '#111827';
                            canvasCtx.beginPath();
                            canvasCtx.moveTo(face[4].x * canvasElement.width, face[4].y * canvasElement.height); 
                            canvasCtx.lineTo(face[279].x * canvasElement.width, face[279].y * canvasElement.height); 
                            canvasCtx.lineTo(face[49].x * canvasElement.width, face[49].y * canvasElement.height); 
                            canvasCtx.closePath();
                            canvasCtx.fill();
                        }

                        // Skeletal Mouth
                        const innerMouth = [78, 191, 80, 81, 82, 13, 312, 311, 310, 415, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95];
                        canvasCtx.beginPath();
                        canvasCtx.moveTo(face[innerMouth[0]].x * canvasElement.width, face[innerMouth[0]].y * canvasElement.height);
                        for (let i = 1; i < innerMouth.length; i++) canvasCtx.lineTo(face[innerMouth[i]].x * canvasElement.width, face[innerMouth[i]].y * canvasElement.height);
                        canvasCtx.closePath();
                        canvasCtx.fillStyle = '#111827'; 
                        canvasCtx.fill();
                        
                        drawConnectors(canvasCtx, face, FACEMESH_LIPS, {color: '#1f2937', lineWidth: 3});

                        canvasCtx.strokeStyle = '#1f2937';
                        canvasCtx.lineWidth = 2.5;
                        const topLipPts = [82, 13, 312, 81, 311];
                        const bottomLipPts = [87, 14, 317, 178, 402];
                        for(let i=0; i<topLipPts.length; i++) {
                            canvasCtx.beginPath();
                            canvasCtx.moveTo(face[topLipPts[i]].x * canvasElement.width, face[topLipPts[i]].y * canvasElement.height - 4);
                            canvasCtx.lineTo(face[bottomLipPts[i]].x * canvasElement.width, face[bottomLipPts[i]].y * canvasElement.height + 4);
                            canvasCtx.stroke();
                        }
                        
                        // Eye Sockets
                        drawRiggedPolygon(canvasCtx, face, FACEMESH_RIGHT_EYE, '#111827', '#1f2937', 3);
                        drawRiggedPolygon(canvasCtx, face, FACEMESH_LEFT_EYE, '#111827', '#1f2937', 3);
                        
                        if (face.length > 473) {
                            const rightIris = face[468]; 
                            const leftIris = face[473];
                            canvasCtx.fillStyle = '#ff0000'; 
                            canvasCtx.shadowColor = '#ff0000';
                            canvasCtx.shadowBlur = 10;
                            
                            canvasCtx.beginPath(); canvasCtx.arc(rightIris.x * canvasElement.width, rightIris.y * canvasElement.height, 6, 0, 2 * Math.PI); canvasCtx.fill();
                            canvasCtx.beginPath(); canvasCtx.arc(leftIris.x * canvasElement.width, leftIris.y * canvasElement.height, 6, 0, 2 * Math.PI); canvasCtx.fill();
                            canvasCtx.shadowBlur = 0; 
                        }
                    }

                } else if (displayMode === 'human') {
                    // ==========================================
                    // HUMAN RIG MODE RENDERING
                    // Uses external images mapped to skeleton
                    // ==========================================
                    if (activePose && activePose.length > 28) {
                        const p = activePose;
                        const midShoulder = { x: (p[11].x + p[12].x)/2, y: (p[11].y + p[12].y)/2 };
                        const midHip = { x: (p[23].x + p[24].x)/2, y: (p[23].y + p[24].y)/2 };
                        
                        // Draw Arms
                        drawRiggedImage(canvasCtx, humanUpperArmImg, p[11], p[13], 0.35); // L Upper Arm
                        drawRiggedImage(canvasCtx, humanLowerArmImg, p[13], p[15], 0.25);  // L Lower Arm
                        drawRiggedImage(canvasCtx, humanUpperArmImg, p[12], p[14], 0.35); // R Upper Arm
                        drawRiggedImage(canvasCtx, humanLowerArmImg, p[14], p[16], 0.25);  // R Lower Arm
                        
                        // Draw Legs
                        drawRiggedImage(canvasCtx, humanUpperLegImg, p[23], p[25], 0.45); // L Upper Leg
                        drawRiggedImage(canvasCtx, humanLowerLegImg, p[25], p[27], 0.35); // L Lower Leg
                        drawRiggedImage(canvasCtx, humanUpperLegImg, p[24], p[26], 0.45); // R Upper Leg
                        drawRiggedImage(canvasCtx, humanLowerLegImg, p[26], p[28], 0.35); // R Lower Leg
                        
                        // Draw Torso (Drawn after limbs so it sits on top)
                        drawRiggedImage(canvasCtx, humanTorsoImg, midShoulder, midHip, 0.9);
                    }
                    
                    // Draw Dynamic Expressive Human Face
                    if (activeFaces.length > 0) {
                        const face = activeFaces[0];
                        
                        // Skin Face Base
                        drawRiggedPolygon(canvasCtx, face, FACEMESH_FACE_OVAL, '#fbcfb5', '#d99f81', 3);
                        
                        // Normal Eyebrows
                        drawRiggedPolygon(canvasCtx, face, FACEMESH_LEFT_EYEBROW, '#374151', '#374151', 3);
                        drawRiggedPolygon(canvasCtx, face, FACEMESH_RIGHT_EYEBROW, '#374151', '#374151', 3);

                        // Human Mouth (Dark inner space, fleshy lips)
                        const innerMouth = [78, 191, 80, 81, 82, 13, 312, 311, 310, 415, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95];
                        canvasCtx.beginPath();
                        canvasCtx.moveTo(face[innerMouth[0]].x * canvasElement.width, face[innerMouth[0]].y * canvasElement.height);
                        for (let i = 1; i < innerMouth.length; i++) canvasCtx.lineTo(face[innerMouth[i]].x * canvasElement.width, face[innerMouth[i]].y * canvasElement.height);
                        canvasCtx.closePath();
                        canvasCtx.fillStyle = '#4c1d95'; // Dark throat
                        canvasCtx.fill();
                        
                        drawConnectors(canvasCtx, face, FACEMESH_LIPS, {color: '#e17a7a', lineWidth: 4}); // Lips
                        
                        // Normal White Eyes
                        drawRiggedPolygon(canvasCtx, face, FACEMESH_RIGHT_EYE, '#ffffff', '#1f2937', 2);
                        drawRiggedPolygon(canvasCtx, face, FACEMESH_LEFT_EYE, '#ffffff', '#1f2937', 2);
                        
                        if (face.length > 473) {
                            const rightIris = face[468]; 
                            const leftIris = face[473];
                            
                            // Blue Human Pupils
                            canvasCtx.fillStyle = '#3b82f6'; 
                            canvasCtx.beginPath(); canvasCtx.arc(rightIris.x * canvasElement.width, rightIris.y * canvasElement.height, 5, 0, 2 * Math.PI); canvasCtx.fill();
                            canvasCtx.beginPath(); canvasCtx.arc(leftIris.x * canvasElement.width, leftIris.y * canvasElement.height, 5, 0, 2 * Math.PI); canvasCtx.fill();
                            
                            // Anime shine
                            canvasCtx.fillStyle = '#ffffff';
                            canvasCtx.beginPath(); canvasCtx.arc(rightIris.x * canvasElement.width + 2, rightIris.y * canvasElement.height - 2, 2, 0, 2 * Math.PI); canvasCtx.fill();
                            canvasCtx.beginPath(); canvasCtx.arc(leftIris.x * canvasElement.width + 2, leftIris.y * canvasElement.height - 2, 2, 0, 2 * Math.PI); canvasCtx.fill();
                        }
                    }
                }

            // Hands apply to both Canvas modes
            if (activeHands.length > 0) {
                for (let i = 0; i < activeHands.length; i++) {
                    const boneColor = displayMode === 'skeleton' ? '#f8fafc' : '#fbcfb5';
                    const outlineColor = displayMode === 'skeleton' ? '#1f2937' : '#d99f81';
                    
                    drawConnectors(canvasCtx, activeHands[i], HAND_CONNECTIONS, {color: outlineColor, lineWidth: 10});
                    drawConnectors(canvasCtx, activeHands[i], HAND_CONNECTIONS, {color: boneColor, lineWidth: 6});
                    drawLandmarks(canvasCtx, activeHands[i], {color: boneColor, fillColor: outlineColor, lineWidth: 2, radius: 4});
                }
            }

            canvasCtx.restore();
            requestAnimationFrame(renderLoop);
        }

        // --- Initialization Sequence ---
        async function initialize() {
            loadingBar.style.width = "20%";
            addLog("BOOTING CORE SYSTEM...");

            const holistic = new Holistic({locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`;
            }});
            
            holistic.setOptions({
                modelComplexity: 1, 
                smoothLandmarks: true, 
                refineFaceLandmarks: true, 
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            
            holistic.onResults(onHolisticResults);
            
            loadingBar.style.width = "60%";
            addLog("ALLOCATING CAMERA STREAM...");

            renderLoop();

            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await holistic.send({image: videoElement});
                },
                width: 1280,
                height: 720
            });
            
            try {
                await camera.start();
                loadingBar.style.width = "90%";
                addLog("CAMERA STREAM OBTAINED. ANALYZING FRAMES...");
            } catch (err) {
                console.error(err);
                document.getElementById('loader').innerHTML = `
                    <div class="text-red-500 text-2xl mb-2 font-bold animate-blink">SYSTEM FAILURE</div>
                    <div class="text-white text-sm">ACCESS TO OPTICAL SENSOR DENIED OR UNAVAILABLE.</div>
                    <div class="text-white text-sm mt-4">Please grant camera permissions and reload.</div>
                `;
            }
        }

        window.addEventListener('load', () => {
            setTimeout(initialize, 1000); 
        });

    </script>
</body>
</html>
